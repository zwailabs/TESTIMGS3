name: TodoApp
options:
  bundleIdPrefix: com.example
targets:
  TodoApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: [Sources]
    info:
      path: Info.plist
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGN_IDENTITY: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.example.TodoApp
